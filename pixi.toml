# pixi manages the BEAM toolchain; mix manages Elixir deps. `pixi run setup` then `pixi run test`.
# (Replaces the deleted pyproject.toml — the workflow is entirely Elixir/Nx now, see decisions/.)
[workspace]
name = "trellis-slat-fsq"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]

[dependencies]
erlang = ">=26"
elixir = ">=1.18"

[tasks]
setup = "mix deps.get"
compile = "mix compile"
test = "mix test"
# Slang -> Nx path tests need the NIF + CUDA; excluded by default (see test_helper.exs).
test-slang = "mix test --include slang_nif"
