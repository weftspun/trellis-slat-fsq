[project]
name = "trellis-slat-fsq"
version = "0.1.0"
description = "TRELLIS.2 SLAT -> ~512 reconstructive FSQ tokens for generation (Kyvo-style render aux-loss)"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT OR Apache-2.0"
authors = [{ name = "K. S. Ernest (iFire) Lee" }]
dependencies = [
    "torch>=2.5",
    "vector-quantize-pytorch",  # MIT — FSQ
    "numpy",
]

# Training the SLAT->FSQ tokenizer needs a differentiable multi-view renderer + the TRELLIS.2 decoder
# (Kyvo-style pixel aux-loss). Kept as an extra so the core stays installable without a renderer;
# inference is render-free and does not need this.
[project.optional-dependencies]
render = []  # TODO: TRELLIS.2 decoder + differentiable renderer (nvdiffrast / gsplat) — see decisions/
test = ["pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["trellis_slat_fsq"]
