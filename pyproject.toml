[project]
name = "trellis-slat-fsq"
version = "0.1.0"
description = "TRELLIS.2 SLAT -> ~512 render-free FSQ tokens (fixed grid, no training). See decisions/20260713-no-budget-descope-render-free-fsq-only.md"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT OR Apache-2.0"
authors = [{ name = "K. S. Ernest (iFire) Lee" }]
dependencies = [
    "torch>=2.5",
    "vector-quantize-pytorch",  # MIT — FSQ
    "numpy",
]

# Zero-compute descope: no renderer, no TRELLIS.2 decoder, no training. FSQ is a fixed grid (no learned
# codebook), so tokenization runs on CPU with no training step. See decisions/.
[project.optional-dependencies]
test = ["pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["trellis_slat_fsq"]
